<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classwork - Teacher Intelligence System</title>

<link rel="stylesheet" href="styles.css">

<!-- LIBRARIES -->

<script src="https://unpkg.com/dexie/dist/dexie.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="dark">

<div id="snow-container"></div>

<header class="header">

<h1>📚 Classwork Management</h1>

<button onclick="location.href='index.html'" style="background: #2196F3; color: white;">
⬅️ Back to Dashboard
</button>

<button id="themeToggle">
Toggle Theme
</button>

<button onclick="lockApp()" style="background: #ff4c4c; color: white; margin-left: 10px;">
Lock App
</button>

</header>

<div id="lockScreen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;">
    
    <!-- Teacher Login View -->
    <div id="teacherLoginView" style="display: flex; flex-direction: column; align-items: center;">
        <h2 style="margin-bottom: 10px;">🔒 App Locked</h2>
        <p style="margin-bottom: 20px;">Please enter the authorized Teacher PIN to continue.</p>
        <input type="password" id="accessCode" placeholder="Enter PIN" style="padding: 10px; text-align: center; font-size: 18px; width: 200px; border-radius: 5px; border: none; margin-bottom: 15px;">
        <button onclick="unlockApp()" style="padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background: #4CAF50; color: white; font-weight: bold; width: 100%;">Unlock System</button>
        <p id="lockError" style="color: #ff4c4c; margin-top: 15px; display: none;">Incorrect PIN! Access Denied.</p>
    </div>

</div>

<div id="appContent" style="display: none;">

<!-- CLASSWORK PAGE -->

<section class="module" style="max-width: 1200px; margin: 20px auto;">

<h2>Upload Classwork</h2>

<div style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;">
    <select id="classworkClassFilter" onchange="filterClassworkByClass()" style="padding: 10px; width: 100%; box-sizing: border-box;">
        <option value="" disabled selected>Select Class First</option>
        <option value="all">All Classes</option>
    </select>
</div>

<label style="font-size: 12px; color: #aaa; margin-bottom: 5px; display: block;">📷 Upload Classwork Photo</label>
<input type="file" id="classworkPhoto" accept="image/*" style="padding: 10px; width: 100%; box-sizing: border-box;">

<label style="font-size: 12px; color: #aaa; margin-top: 10px; margin-bottom: 5px; display: block;">📅 Date</label>
<input type="date" id="classworkDate" style="padding: 10px; width: 100%; box-sizing: border-box;">

<label style="font-size: 12px; color: #aaa; margin-top: 10px; margin-bottom: 5px; display: block;">📚 Subject (Optional)</label>
<input id="classworkSubject" placeholder="Subject (e.g. Math, Science)" style="padding: 10px; width: 100%; box-sizing: border-box;">

<label style="font-size: 12px; color: #aaa; margin-top: 10px; margin-bottom: 5px; display: block;">📝 Notes (Optional)</label>
<textarea id="classworkNotes" placeholder="Additional notes or instructions..." style="padding: 10px; width: 100%; box-sizing: border-box; height: 80px;"></textarea>

<button onclick="saveClasswork()" style="margin-top: 10px;">
Save Classwork
</button>

<h3 style="margin-top: 20px;">Classwork Gallery</h3>

<div id="classworkGallery" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px;"></div>

</section>

</div> <!-- END APP CONTENT -->

<!-- DATABASE & SCRIPTS -->

<script src="js/db.js"></script>

<script src="js/classwork.js"></script>

<script src="js/app.js"></script>

</body>

</html>
